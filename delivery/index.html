<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Food</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
<div class="page-wapper">
        <header class="header">
        <div class="containter">
            <div class="header-box">
                <div class="header-logo logo" >
                    <img src="./foto/logo.png" alt="">
                </div>
                <div class="header-controls">
                    <button class="btn btn-primary"><img src="./foto/icons/user.png" alt="">Войти</button>
                    <button class="btn btn-outline"><img src="./foto/icons/icon container.png" alt="">Корзина</button>
                </div>
            </div>
        </div>
    </header>
    <main class="main">
        <section class="banner">
        <div class="containter">
            <div class="banner-item">
               <h2 class="banner-item-title">
                Онлайн-сервис <br> доставки еды на дом
               </h2>
               <p class="banner-item-subtitle">
                Блюда из любимого ресторана привезет 
                курьер в перчатках, маске и с антисептиком
               </p>
            </div>
        </div>
        </section>
        <section class="products"></section>
        <div class="containter">
            <div class="products-header">
                <h3 class="products-header-title">
                     Рестораны
                </h3>

                <input type="text" class="products-header-search" placeholder="Поиск блюд и ресторанов">
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="containter">
            <div class="footer-box">
                <div class="footer-logo">
                    <img src="./foto/logo.png" alt="">
                </div> 
            <div class="footer-nav">
                <ul>
                    <li>Ресторан</li>
                    <li>Курьерам</li>
                    <li>Пресс-центр</li>
                    <li>Контакты</li>
                </ul>
            </div>
            <div class="footer-social">
                <img src="./foto/socion/INST.png" alt="INST">
                <img src="./foto/socion/FS.png" alt="FB">
                <img src="./foto/socion/VK.png" alt="VK">
            </div>
            </div>
        </div>
    </footer>
</div>
</body>
</html>
